# -------------------------------------------------------------------------------------------------
# GitHub Actions Reusable Workflow: Publish to NuGet
#
# Purpose:
#   This workflow builds, tests, and publishes the Calendrier Républicain .NET library to NuGet 
#   when a new release is published in the main branch.
#
# Inputs:
#   - release_tag: The release tag (e.g., v1.2.3) to determine the version number for the NuGet
#     package.
#   - dotnet_version: The version of the .NET SDK to use for building and testing.
#
# Prerequisites:
#   - The repository must contain a valid .NET project.
#   - The NuGet API key must be stored in the repository secrets as NUGET_API_KEY.
#   - The release tag must follow the format: v<major>.<minor>.<patch> (e.g., v1.2.3).
# -------------------------------------------------------------------------------------------------

name: Publish to NuGet

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.2.3)'
        required: true
        type: string
      dotnet_version:
        description: '.NET SDK version to use'
        required: false
        type: string
        default: '10.0.x'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Extract version from release tag
        id: get_version
        run: |
          VERSION=$(echo "${{ inputs.release_tag }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Validate version
        run: |
          if [ -z "${{ env.VERSION }}" ]; then
            echo "Error: Failed to extract version from release tag. Ensure the tag follows the format v<major>.<minor>.<patch>."
            exit 1
          fi

      - name: Pack
        run: dotnet pack --configuration Release --no-restore --output ./nupkg /p:Version=${{ env.VERSION }}

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
